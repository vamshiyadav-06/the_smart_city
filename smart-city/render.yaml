# Deploy from the smart-city/ directory as the Git repository root.
# If your repo root is the parent folder, set Root Directory to "smart-city" in the Render dashboard.
services:
  - type: web
    name: smart-city-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_city_images.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
    healthCheckPath: /health

